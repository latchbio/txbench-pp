   <g id="text_1">
    <text style="fill: #15191f; font: 700 10.2px 'DejaVu Serif', serif; text-anchor: start" x="23.4936" y="19.935107" transform="rotate(-0 23.4936 19.935107)">Program decisions integrate several assay readouts into one go/no-go</text>
   </g>
   <g id="text_2">
    <text style="fill: #5f6872; font: 6.7px 'DejaVu Serif', serif; text-anchor: start" x="23.4936" y="31.271396" transform="rotate(-0 23.4936 31.271396)">Across 7 such advancement evaluations (230 runs) models pass only 35%; the same call can fail by advancing too much or too little.</text>
   </g>
   <g id="text_3">
    <text style="fill: #ffffff; font: 700 5px 'DejaVu Sans Mono', monospace" transform="translate(30.168708 94.539351) rotate(-90)">CORRECT</text>
   </g>
   <g id="text_4">
    <text style="fill: #15191f; font: 700 7.2px 'DejaVu Serif', serif; text-anchor: start" x="41.8239" y="60.008598" transform="rotate(-0 41.8239 60.008598)">Advance one compound, or none</text>
   </g>
   <g id="text_5">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 74.189524)">Colorectal-cancer organoid program. Inputs: primary</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 80.426524)">screen, mechanism image, tox counterscreen, DMPK</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 86.663524)">exposure. Advance a compound only if the desired</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 92.900524)">mechanism, an adequate safety margin, and covering</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 99.137524)">exposure all hold.</text>
   </g>
   <g id="text_6">
    <text style="fill: #19736a; font: 700 4.9px 'DejaVu Sans Mono', monospace; text-anchor: start" x="204.35256" y="62.800134" transform="rotate(-0 204.35256 62.800134)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_7">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 74.755306)">Advance CMP-05, the one</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 80.914103)">compound that satisfies all</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 87.0729)">three criteria together.</text>
   </g>
   <g id="text_8">
    <text style="fill: #19736a; font: 700 4.9px 'DejaVu Sans Mono', monospace; text-anchor: start" x="304.15086" y="62.800134" transform="rotate(-0 304.15086 62.800134)">MOSTLY CORRECT  (82% PASS)</text>
   </g>
   <g id="text_9">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 71.597704)">The tempting shortcut, ranking</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 77.834704)">by potency or by total</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 84.071704)">exposure, advances the wrong</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 90.308704)">compound.</text>
   </g>
   <g id="text_10">
    <text style="fill: #ffffff; font: 700 5px 'DejaVu Sans Mono', monospace" transform="translate(30.168708 187.66652) rotate(-90)">WRONG SYNTHESIS</text>
   </g>
   <g id="text_11">
    <text style="fill: #15191f; font: 700 7.2px 'DejaVu Serif', serif; text-anchor: start" x="41.8239" y="141.043955" transform="rotate(-0 41.8239 141.043955)">Pick the next decision-gate models</text>
   </g>
   <g id="text_12">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 155.276068)">NSCLC mTOR + WEE1 combination. The gate set must</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 161.513068)">span models with confirmed multi-endpoint support,</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 167.671865)">the strongest responder still lacking confirmation,</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 173.908865)">and the strongest responder outside the primary</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 180.145865)">genotype.</text>
   </g>
   <g id="text_13">
    <text style="fill: #19736a; font: 700 4.9px 'DejaVu Sans Mono', monospace; text-anchor: start" x="204.35256" y="143.886678" transform="rotate(-0 204.35256 143.886678)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_14">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 152.72335)">Build the gate on convergent</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 158.96035)">multi-endpoint support (e.g.</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 165.19735)">PDX239 for the unconfirmed</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 171.356147)">slot).</text>
   </g>
   <g id="text_15">
    <text style="fill: #a95f3d; font: 700 4.9px 'DejaVu Sans Mono', monospace; text-anchor: start" x="304.15086" y="143.886678" transform="rotate(-0 304.15086 143.886678)">COMMON FAILURE  (27% PASS)</text>
   </g>
   <g id="text_16">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 152.72335)">Rank on a single synergy</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 158.96035)">metric and nominate an</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 165.119147)">artifact model (H2009), so the</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 171.277944)">wrong models gate the program.</text>
   </g>
   <g id="text_17">
    <text style="fill: #ffffff; font: 700 5px 'DejaVu Sans Mono', monospace" transform="translate(30.168708 258.217517) rotate(-90)">FALSE-GO</text>
   </g>
   <g id="text_18">
    <text style="fill: #15191f; font: 700 7.2px 'DejaVu Serif', serif; text-anchor: start" x="41.8239" y="222.130499" transform="rotate(-0 41.8239 222.130499)">Advance only if safe and active</text>
   </g>
   <g id="text_19">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 242.560511)">Blinded intestinal multiplex-IF package. A candidate</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 248.797511)">may advance only with paired evidence of activity</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(41.8239 255.034511)">and healthy-tissue sparing.</text>
   </g>
   <g id="text_20">
    <text style="fill: #19736a; font: 700 4.9px 'DejaVu Sans Mono', monospace; text-anchor: start" x="204.35256" y="224.973222" transform="rotate(-0 204.35256 224.973222)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_21">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 233.809894)">No candidate advances; the</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 239.968691)">paired activity-and-safety</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 246.205691)">evidence fails for every</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(204.35256 252.442691)">candidate.</text>
   </g>
   <g id="text_22">
    <text style="fill: #a95f3d; font: 700 4.9px 'DejaVu Sans Mono', monospace; text-anchor: start" x="304.15086" y="224.973222" transform="rotate(-0 304.15086 224.973222)">COMMON FAILURE  (36% PASS)</text>
   </g>
   <g id="text_23">
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 233.770792)">Advance on activity alone or a</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 240.007792)">relative tumour-vs-healthy</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 246.244792)">index, pushing an unsafe</text>
    <text style="fill: #15191f; font: 5.5px 'DejaVu Serif', serif" transform="translate(304.15086 252.481792)">candidate forward.</text>
   </g>
  </g>
 </g>
