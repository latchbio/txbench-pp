   <g id="text_1">
    <text style="font-weight: 700; font-size: 9.8px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="23.4936" y="20.196252" transform="rotate(-0 23.4936 20.196252)">Program decisions integrate several assay readouts into one go/no-go</text>
   </g>
   <g id="text_2">
    <text style="font-size: 6.3px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #5f6872" x="23.4936" y="30.603921" transform="rotate(-0 23.4936 30.603921)">Across 7 such advancement evaluations (230 runs) models pass only 35%; the same call can fail by advancing too much or too little.</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 5px; font-family: 'DejaVu Sans Mono', monospace; fill: #ffffff" transform="translate(30.168708 83.853291) rotate(-90)">CORRECT</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 7px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="41.8239" y="55.759374" transform="rotate(-0 41.8239 55.759374)">Advance one compound, or none</text>
   </g>
   <g id="text_5">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 64.092956)">Colorectal-cancer organoid program. Inputs: primary</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 70.046456)">screen, mechanism image, tox counterscreen, DMPK</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 75.999956)">exposure. Advance a compound only if the desired</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 81.953456)">mechanism, an adequate safety margin, and covering</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 87.906956)">exposure all hold.</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 4.75px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="204.35256" y="58.099011" transform="rotate(-0 204.35256 58.099011)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_7">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 66.629868)">Advance CMP-05, the one</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 72.50872)">compound that satisfies all</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 78.387571)">three criteria together.</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 4.75px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="304.15086" y="58.099011" transform="rotate(-0 304.15086 58.099011)">MOSTLY CORRECT  (82% PASS)</text>
   </g>
   <g id="text_9">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 63.615794)">The tempting shortcut, ranking</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 69.569294)">by potency or by total</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 75.522794)">exposure, advances the wrong</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 81.476294)">compound.</text>
   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 5px; font-family: 'DejaVu Sans Mono', monospace; fill: #ffffff" transform="translate(30.168708 157.570916) rotate(-90)">WRONG SYNTHESIS</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 7px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="41.8239" y="117.386609" transform="rotate(-0 41.8239 117.386609)">Pick the next decision-gate models</text>
   </g>
   <g id="text_12">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 125.769956)">NSCLC mTOR + WEE1 combination. The gate set must</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 131.723456)">span models with confirmed multi-endpoint support,</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 137.602307)">the strongest responder still lacking confirmation,</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 143.555807)">and the strongest responder outside the primary</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 149.509307)">genotype.</text>
   </g>
   <g id="text_13">
    <text style="font-weight: 700; font-size: 4.75px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="204.35256" y="119.776011" transform="rotate(-0 204.35256 119.776011)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_14">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 125.330118)">Build the gate on convergent</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 131.283618)">multi-endpoint support (e.g.</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 137.237118)">PDX239 for the unconfirmed</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 143.11597)">slot).</text>
   </g>
   <g id="text_15">
    <text style="font-weight: 700; font-size: 4.75px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #a95f3d" x="304.15086" y="119.776011" transform="rotate(-0 304.15086 119.776011)">COMMON FAILURE  (27% PASS)</text>
   </g>
   <g id="text_16">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 125.330118)">Rank on a single synergy</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 131.283618)">metric and nominate an</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 137.16247)">artifact model (H2009), so the</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 143.041321)">wrong models gate the program.</text>
   </g>
   <g id="text_17">
    <text style="font-weight: 700; font-size: 5px; font-family: 'DejaVu Sans Mono', monospace; fill: #ffffff" transform="translate(30.168708 208.712369) rotate(-90)">FALSE-GO</text>
   </g>
   <g id="text_18">
    <text style="font-weight: 700; font-size: 7px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="41.8239" y="179.063609" transform="rotate(-0 41.8239 179.063609)">Advance only if safe and active</text>
   </g>
   <g id="text_19">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 193.363132)">Blinded intestinal multiplex-IF package. A candidate</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 199.316632)">may advance only with paired evidence of activity</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 205.270132)">and healthy-tissue sparing.</text>
   </g>
   <g id="text_20">
    <text style="font-weight: 700; font-size: 4.75px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="204.35256" y="181.453011" transform="rotate(-0 204.35256 181.453011)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_21">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 187.007118)">No candidate advances; the</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 192.88597)">paired activity-and-safety</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 198.83947)">evidence fails for every</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 204.79297)">candidate.</text>
   </g>
   <g id="text_22">
    <text style="font-weight: 700; font-size: 4.75px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #a95f3d" x="304.15086" y="181.453011" transform="rotate(-0 304.15086 181.453011)">COMMON FAILURE  (36% PASS)</text>
   </g>
   <g id="text_23">
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 186.969794)">Advance on activity alone or a</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 192.923294)">relative tumour-vs-healthy</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 198.876794)">index, pushing an unsafe</text>
    <text style="font-size: 5.25px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 204.830294)">candidate forward.</text>
   </g>
  </g>
 </g>
