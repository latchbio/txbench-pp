   <g id="text_1">
    <text style="font-weight: 700; font-size: 9.8px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="23.4936" y="22.291884" transform="rotate(-0 23.4936 22.291884)">Program decisions combine assay readouts into one advance/hold call</text>
   </g>
   <g id="text_2">
    <text style="font-size: 6.3px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #5f6872" x="23.4936" y="34.994769" transform="rotate(-0 23.4936 34.994769)">Across 7 advancement evaluations (230 runs), models pass only 35%; errors either advance weak candidates or discard supported ones.</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 5px; font-family: 'DejaVu Sans Mono', monospace; fill: #ffffff" transform="translate(30.168708 87.289185) rotate(-90)">CORRECT</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 6.6px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="41.8239" y="60.286758" transform="rotate(-0 41.8239 60.286758)">Clean go/no-go</text>
   </g>
   <g id="text_5">
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 75.121947)">Organoid program with primary screen, mechanism</text>
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 80.565147)">image, tox counterscreen, and DMPK exposure for</text>
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 86.008347)">eight blinded compounds.</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="204.35256" y="62.706454" transform="rotate(-0 204.35256 62.706454)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_7">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 70.132893)">Advance the one compound with</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 75.451854)">the desired cytostatic</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 80.838354)">mechanism, safety margin, and</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 86.224854)">exposure coverage.</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="304.15086" y="62.706454" transform="rotate(-0 304.15086 62.706454)">MOSTLY CORRECT  (82% PASS)</text>
   </g>
   <g id="text_9">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 72.826143)">Potency-only or exposure-only</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 78.212643)">ranking advances the wrong</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 83.599143)">compound.</text>
   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 5px; font-family: 'DejaVu Sans Mono', monospace; fill: #ffffff" transform="translate(30.168708 158.947214) rotate(-90)">WRONG SYNTHESIS</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 6.6px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="41.8239" y="119.904162" transform="rotate(-0 41.8239 119.904162)">Wrong synthesis</text>
   </g>
   <g id="text_12">
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 137.460951)">Decision-gate set must combine experimental models</text>
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 142.904151)">with convergent support across several endpoints.</text>
   </g>
   <g id="text_13">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="204.35256" y="122.323858" transform="rotate(-0 204.35256 122.323858)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_14">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 132.477317)">Select the experimental models</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 137.796278)">supported by multi-endpoint</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 143.182778)">evidence.</text>
   </g>
   <g id="text_15">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #a95f3d" x="304.15086" y="122.323858" transform="rotate(-0 304.15086 122.323858)">COMMON FAILURE  (27% PASS)</text>
   </g>
   <g id="text_16">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 132.477317)">Overfit on one endpoint and</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 137.796278)">nominate the wrong models for</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 143.182778)">the next experiments.</text>
   </g>
   <g id="text_17">
    <text style="font-weight: 700; font-size: 5px; font-family: 'DejaVu Sans Mono', monospace; fill: #ffffff" transform="translate(30.168708 208.029071) rotate(-90)">FALSE-GO</text>
   </g>
   <g id="text_18">
    <text style="font-weight: 700; font-size: 6.6px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="41.8239" y="179.521566" transform="rotate(-0 41.8239 179.521566)">False-go</text>
   </g>
   <g id="text_19">
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 197.078355)">Safety advancement task; a candidate may advance</text>
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 202.521555)">only with activity and healthy-tissue sparing.</text>
   </g>
   <g id="text_20">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="204.35256" y="181.941262" transform="rotate(-0 204.35256 181.941262)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_21">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 189.401471)">No candidate advances; the</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 194.720432)">paired activity-and-safety</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 200.106932)">evidence fails for every</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 205.493432)">candidate.</text>
   </g>
   <g id="text_22">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #a95f3d" x="304.15086" y="181.941262" transform="rotate(-0 304.15086 181.941262)">COMMON FAILURE  (36% PASS)</text>
   </g>
   <g id="text_23">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 189.367701)">Advance on activity alone or a</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 194.754201)">relative tumor-vs-healthy</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 200.140701)">index, pushing an unsafe</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 205.527201)">candidate forward.</text>
   </g>
   <g id="text_24">
    <text style="font-weight: 700; font-size: 5px; font-family: 'DejaVu Sans Mono', monospace; fill: #ffffff" transform="translate(30.168708 272.161709) rotate(-90)">FALSE NO-GO</text>
   </g>
   <g id="text_25">
    <text style="font-weight: 700; font-size: 6.6px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="41.8239" y="239.13897" transform="rotate(-0 41.8239 239.13897)">False no-go</text>
   </g>
   <g id="text_26">
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 256.729884)">Long-term combination follow-up; colony-stain</text>
    <text style="font-size: 4.8px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(41.8239 262.173084)">reduction must be read with short-term response.</text>
   </g>
   <g id="text_27">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #19736a" x="204.35256" y="241.558666" transform="rotate(-0 204.35256 241.558666)">DATA-SUPPORTED CALL</text>
   </g>
   <g id="text_28">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 249.052644)">Keep the model where the</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 254.371605)">combination remains supported</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 259.690566)">by both short- and long-term</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(204.35256 265.077066)">evidence.</text>
   </g>
   <g id="text_29">
    <text style="font-weight: 700; font-size: 4.45px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #a95f3d" x="304.15086" y="241.558666" transform="rotate(-0 304.15086 241.558666)">COMMON FAILURE  (48% PASS)</text>
   </g>
   <g id="text_30">
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 251.712125)">Treat a strong colony-stain</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 257.098625)">reduction as a reason to drop</text>
    <text style="font-size: 4.75px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(304.15086 262.417586)">a still-supported model.</text>
   </g>
  </g>
 </g>
