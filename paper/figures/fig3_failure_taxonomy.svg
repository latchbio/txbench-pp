   <g id="text_1">
    <text style="font-weight: 700; font-size: 10.8px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="29.2968" y="20.955724" transform="rotate(-0 29.2968 20.955724)">Failure modes should be read as program-relevant judgment gaps</text>
   </g>
   <g id="text_2">
    <text style="font-size: 7px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #5f6872" x="31.3056" y="34.404017" transform="rotate(-0 31.3056 34.404017)">These categories should be replaced or quantified after trajectory review, but they define the expected diagnostic frame.</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 8.4px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="38.13552" y="72.702843" transform="rotate(-0 38.13552 72.702843)">Literature prior over evidence</text>
   </g>
   <g id="text_4">
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(38.13552 86.007097)">Importing the known mechanism of a compound</text>
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(38.13552 93.548197)">instead of reading the supplied assay footprint.</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 6.1px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #5f6872" x="38.13552" y="106.795803" transform="rotate(-0 38.13552 106.795803)">decryptM, decryptE</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 8.4px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="224.95392" y="72.643124" transform="rotate(-0 224.95392 72.643124)">Assay-context calibration failure</text>
   </g>
   <g id="text_7">
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(224.95392 86.054374)">Using the right workflow with the wrong tolerance,</text>
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(224.95392 93.595474)">prompt context, species, or source convention.</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 6.1px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #5f6872" x="224.95392" y="106.795803" transform="rotate(-0 224.95392 106.795803)">DM, DE, PK</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 8.4px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="38.13552" y="155.844704" transform="rotate(-0 38.13552 155.844704)">Multi-property integration gap</text>
   </g>
   <g id="text_10">
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(38.13552 169.208677)">Optimizing one attractive value while missing the</text>
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(38.13552 176.749777)">property that changes the advancement decision.</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 6.1px; font-family: 'DejaVu Sans Mono', monospace; text-anchor: start; fill: #5f6872" x="38.13552" y="189.997383" transform="rotate(-0 38.13552 189.997383)">PK, ADMET, MPO</text>
   </g>
   <g id="text_12">
    <text style="font-weight: 700; font-size: 8.4px; font-family: 'DejaVu Serif', serif; text-anchor: start; fill: #15191f" x="224.95392" y="155.844704" transform="rotate(-0 224.95392 155.844704)">Rigid threshold shortcut</text>
   </g>
   <g id="text_13">
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(224.95392 169.208677)">Treating a rule-of-thumb cutoff as dispositive</text>
    <text style="font-size: 6.65px; font-family: 'DejaVu Serif', serif; fill: #15191f" transform="translate(224.95392 176.749777)">when margin or protocol context changes the call.</text>
